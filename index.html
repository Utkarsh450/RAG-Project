<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF RAG Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f6f5f0;
      --surface: #ffffff;
      --surface2: #f1efe8;
      --border: rgba(0,0,0,0.10);
      --border-med: rgba(0,0,0,0.18);
      --text: #1c1c1a;
      --text-muted: #5f5e5a;
      --text-hint: #888780;
      --accent: #534ab7;
      --accent-bg: #eeedfe;
      --accent-hover: #3c3489;
      --success: #0f6e56;
      --success-bg: #e1f5ee;
      --danger: #993c1d;
      --danger-bg: #faece7;
      --warning: #854f0b;
      --warning-bg: #faeeda;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.05);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo-icon {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
    }
    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-hint);
      transition: background 0.3s;
    }
    .dot.active { background: #1d9e75; }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 320px 1fr;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      gap: 1.5rem;
      align-items: start;
    }

    /* ── Panel card ── */
    .panel {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .panel-header {
      padding: 1.1rem 1.25rem;
      border-bottom: 0.5px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-body { padding: 1.25rem; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1.5px dashed var(--border-med);
      border-radius: var(--radius-sm);
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      position: relative;
      background: var(--surface);
    }
    .upload-zone:hover, .upload-zone.drag-over {
      background: var(--accent-bg);
      border-color: var(--accent);
    }
    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .upload-icon {
      width: 40px;
      height: 40px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 20px;
      color: var(--accent);
    }
    .upload-zone h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .upload-zone p {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── File preview ── */
    .file-preview {
      display: none;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-top: 12px;
    }
    .file-preview.visible { display: flex; }
    .file-icon {
      width: 36px;
      height: 36px;
      background: var(--danger-bg);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--danger);
      font-size: 16px;
      flex-shrink: 0;
    }
    .file-meta { flex: 1; min-width: 0; }
    .file-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .remove-file {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-hint);
      font-size: 16px;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
    }
    .remove-file:hover { background: var(--border); color: var(--text); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-ghost {
      background: var(--surface2);
      color: var(--text);
      border: 0.5px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--border); }
    .btn-full { width: 100%; }

    /* ── Progress / toast ── */
    .progress-bar {
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 12px;
      display: none;
    }
    .progress-bar.visible { display: block; }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.4s ease;
      border-radius: 99px;
    }

    .toast {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-top: 12px;
      line-height: 1.5;
      display: none;
    }
    .toast.visible { display: flex; }
    .toast.success { background: var(--success-bg); color: var(--success); }
    .toast.error   { background: var(--danger-bg);  color: var(--danger);  }
    .toast.warning { background: var(--warning-bg); color: var(--warning); }
    .toast-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .toast strong { display: block; font-weight: 600; }

    /* ── PDF list ── */
    .pdf-list { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
    .pdf-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      font-size: 13px;
    }
    .pdf-item:hover { background: var(--accent-bg); border-color: var(--accent); }
    .pdf-item.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .pdf-item-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pdf-item-chunks {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 2px 7px;
      border-radius: 99px;
      white-space: nowrap;
    }

    /* ── Chat panel ── */
    .chat-panel { display: flex; flex-direction: column; gap: 0; }
    .chat-messages {
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 420px;
      max-height: 520px;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 2rem;
      flex: 1;
      color: var(--text-muted);
    }
    .empty-state-icon {
      font-size: 36px;
      margin-bottom: 12px;
      color: var(--text-hint);
    }
    .empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: 13px; line-height: 1.6; }

    /* ── Message bubbles ── */
    .message { display: flex; gap: 10px; max-width: 100%; animation: msgIn 0.2s ease; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-top: 2px;
    }
    .avatar.ai  { background: var(--accent-bg); color: var(--accent); }
    .avatar.usr { background: var(--surface2); color: var(--text); }
    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      max-width: calc(100% - 48px);
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.ai .bubble {
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 0.5px solid var(--border);
    }
    .message.error .bubble {
      background: var(--danger-bg);
      color: var(--danger);
      border: 0.5px solid rgba(153,60,29,0.18);
    }
    .bubble-time {
      font-size: 10px;
      opacity: 0.5;
      margin-top: 4px;
      display: block;
    }

    /* ── Typing indicator ── */
    .typing-bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-hint);
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    /* ── Sources ── */
    .sources {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .source-chip {
      font-size: 11px;
      background: var(--surface);
      border: 0.5px solid var(--border-med);
      border-radius: 99px;
      padding: 3px 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Input area ── */
    .chat-input-area {
      padding: 1rem 1.25rem;
      border-top: 0.5px solid var(--border);
      background: var(--surface);
    }
    .no-pdf-banner {
      background: var(--warning-bg);
      color: var(--warning);
      font-size: 12px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .no-pdf-banner.visible { display: flex; }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    textarea#question {
      flex: 1;
      font-family: inherit;
      font-size: 14px;
      border: 0.5px solid var(--border-med);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      resize: none;
      min-height: 44px;
      max-height: 140px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      line-height: 1.5;
    }
    textarea#question:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(83,74,183,0.10);
    }
    textarea#question::placeholder { color: var(--text-hint); }
    #sendBtn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: var(--radius-sm);
    }
    .char-count {
      font-size: 11px;
      color: var(--text-hint);
      text-align: right;
      margin-top: 5px;
    }
    .char-count.warn { color: var(--warning); }

    /* ── Scrollbar ── */
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 99px; }

    /* ── Responsive ── */
    @media (max-width: 760px) {
      main { grid-template-columns: 1fr; padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📄</div>
    PDF Chat
  </div>
</header>

<main>

  <!-- LEFT: Upload & PDF list -->
  <div style="display:flex;flex-direction:column;gap:1.25rem;">

    <div class="panel">
      <div class="panel-header">📎 Upload document</div>
      <div class="panel-body">
        <div class="upload-zone" id="uploadZone">
          <input type="file" id="pdfFile" accept=".pdf" aria-label="Choose PDF file" />
          <div class="upload-icon">📤</div>
          <h3>Drop PDF here</h3>
          <p>or click to browse · max 20 MB</p>
        </div>

        <div class="file-preview" id="filePreview">
          <div class="file-icon">📄</div>
          <div class="file-meta">
            <div class="file-name" id="fileName">document.pdf</div>
            <div class="file-size" id="fileSize"></div>
          </div>
          <button type="button" class="remove-file" id="removeFile" aria-label="Remove file" title="Remove">✕</button>
        </div>

        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="toast" id="uploadToast" role="alert" aria-live="polite">
          <span class="toast-icon" id="toastIcon"></span>
          <div id="toastText"></div>
        </div>

        <button type="button" class="btn btn-primary btn-full" id="uploadBtn" style="margin-top:14px;" disabled>
          <span>Upload PDF</span>
        </button>
      </div>
    </div>

    <!-- Loaded PDFs -->
    <div class="panel" id="pdfListPanel" style="display:none;">
      <div class="panel-header">📚 Loaded documents</div>
      <div class="panel-body" style="padding-top:0.75rem;">
        <div class="pdf-list" id="pdfList"></div>
      </div>
    </div>

  </div>

  <!-- RIGHT: Chat -->
  <div class="panel chat-panel">
    <div class="panel-header">💬 Ask questions</div>

    <div class="chat-messages" id="chatMessages" role="log" aria-live="polite" aria-label="Chat messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">📄</div>
        <h3>No PDF loaded yet</h3>
        <p>Upload a PDF on the left, then ask any question about its contents.</p>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="no-pdf-banner" id="noPdfBanner">
        ⚠️ Upload and process a PDF first before asking questions.
      </div>
      <div class="input-row">
        <textarea id="question" rows="1" placeholder="Ask something about your PDF…" disabled aria-label="Your question"></textarea>
        <button type="button" class="btn btn-primary" id="sendBtn" disabled aria-label="Send question" title="Send">
          ➤
        </button>
      </div>
      <div class="char-count" id="charCount">0 / 500</div>
    </div>
  </div>

</main>

<script>
  const API_URL = "http://127.0.0.1:8000/api";
  const MAX_CHARS = 500;
  const MAX_FILE_MB = 20;

  /* ── State ── */
  let uploadedPdfs = [];    // { name, chunks, id }
  let activePdfId = null;
  let isUploading = false;
  let isAsking = false;
  let selectedFile = null;

  /* ── DOM refs ── */
  const pdfFile       = document.getElementById("pdfFile");
  const uploadZone    = document.getElementById("uploadZone");
  const filePreview   = document.getElementById("filePreview");
  const fileName      = document.getElementById("fileName");
  const fileSize      = document.getElementById("fileSize");
  const removeFile    = document.getElementById("removeFile");
  const progressBar   = document.getElementById("progressBar");
  const progressFill  = document.getElementById("progressFill");
  const uploadToast   = document.getElementById("uploadToast");
  const toastIcon     = document.getElementById("toastIcon");
  const toastText     = document.getElementById("toastText");
  const uploadBtn     = document.getElementById("uploadBtn");
  const pdfListPanel  = document.getElementById("pdfListPanel");
  const pdfList       = document.getElementById("pdfList");
  const chatMessages  = document.getElementById("chatMessages");
  const emptyState    = document.getElementById("emptyState");
  const noPdfBanner   = document.getElementById("noPdfBanner");
  const question      = document.getElementById("question");
  const sendBtn       = document.getElementById("sendBtn");
  const charCount     = document.getElementById("charCount");



  /* ── File selection ── */
  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
  }

  function handleFileSelect(file) {
    if (!file) return;
    hideToast();

    if (file.type !== "application/pdf") {
      showToast("error", "❌", "<strong>Invalid file type</strong>Only PDF files are supported.");
      return;
    }
    if (file.size > MAX_FILE_MB * 1024 * 1024) {
      showToast("error", "❌", `<strong>File too large</strong>Maximum size is ${MAX_FILE_MB} MB.`);
      return;
    }

    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatBytes(file.size);
    filePreview.classList.add("visible");
    uploadBtn.disabled = false;
    hideToast();
  }

  pdfFile.addEventListener("change", () => {
    if (pdfFile.files[0]) handleFileSelect(pdfFile.files[0]);
  });

  /* Drag-and-drop */
  uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
  uploadZone.addEventListener("dragleave",  () => uploadZone.classList.remove("drag-over"));
  uploadZone.addEventListener("drop", e => {
    e.preventDefault();
    uploadZone.classList.remove("drag-over");
    if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]);
  });

  removeFile.addEventListener("click", () => {
    selectedFile = null;
    pdfFile.value = "";
    filePreview.classList.remove("visible");
    uploadBtn.disabled = true;
    hideToast();
    hideProgress();
  });

  /* ── Toast helpers ── */
  function showToast(type, icon, html) {
    uploadToast.className = `toast visible ${type}`;
    toastIcon.textContent = icon;
    toastText.innerHTML = html;
  }
  function hideToast() {
    uploadToast.classList.remove("visible");
  }

  /* ── Progress helpers ── */
  function showProgress(pct) {
    progressBar.classList.add("visible");
    progressFill.style.width = pct + "%";
  }
  function hideProgress() {
    progressBar.classList.remove("visible");
    progressFill.style.width = "0%";
  }

  /* ── Upload ── */
  uploadBtn.addEventListener("click", async () => {
    if (!selectedFile || isUploading) return;

    isUploading = true;
    uploadBtn.disabled = true;
    uploadBtn.querySelector("span").textContent = "Uploading…";
    hideToast();
    showProgress(20);

    const formData = new FormData();
    formData.append("file", selectedFile);

    try {
      showProgress(50);
      const response = await fetch(`${API_URL}/upload`, {
        method: "POST",
        body: formData,
        signal: AbortSignal.timeout(60000)
      });

      showProgress(90);

      if (!response.ok) {
        let errMsg = `Server error (${response.status})`;
        try {
          const errData = await response.json();
          errMsg = errData.detail || errData.message || errMsg;
        } catch {}
        throw new Error(errMsg);
      }

      const data = await response.json();
      showProgress(100);

      const pdfId = data.id || data.filename || selectedFile.name;
      const chunks = data.chunks || data.num_chunks || "?";

      /* Add to list (avoid duplicates) */
      const existingIdx = uploadedPdfs.findIndex(p => p.id === pdfId);
      if (existingIdx >= 0) {
        uploadedPdfs[existingIdx].chunks = chunks;
      } else {
        uploadedPdfs.push({ id: pdfId, name: selectedFile.name, chunks });
      }
      activePdfId = pdfId;
      renderPdfList();

      showToast("success", "✅", `<strong>Upload successful</strong>${chunks} chunks indexed — ready to chat.`);

      /* Enable chat */
      question.disabled = false;
      sendBtn.disabled = false;
      noPdfBanner.classList.remove("visible");
      question.focus();

      /* Hide empty state (don't remove — re-uploads would break) */
      const es = document.getElementById("emptyState");
      if (es) es.style.display = "none";

      /* Reset upload zone for next file */
      selectedFile = null;
      pdfFile.value = "";
      filePreview.classList.remove("visible");
      uploadBtn.disabled = true;

    } catch (err) {
      hideProgress();
      let msg = err.message || "Unknown error";
      if (err.name === "TimeoutError") msg = "Request timed out — try a smaller PDF.";
      if (msg.includes("Failed to fetch") || msg.includes("NetworkError")) {
        msg = "Could not reach the API server. Is the backend running?";
      }
      showToast("error", "❌", `<strong>Upload failed</strong>${msg}`);
      /* On failure: restore button so user can retry */
      uploadBtn.disabled = false;
    } finally {
      isUploading = false;
      uploadBtn.querySelector("span").textContent = "Upload PDF";
      setTimeout(hideProgress, 800);
    }
  });

  /* ── PDF List ── */
  function renderPdfList() {
    if (uploadedPdfs.length === 0) { pdfListPanel.style.display = "none"; return; }
    pdfListPanel.style.display = "block";
    pdfList.innerHTML = "";
    uploadedPdfs.forEach(pdf => {
      const item = document.createElement("div");
      item.className = "pdf-item" + (pdf.id === activePdfId ? " active" : "");
      item.innerHTML = `<span>📄</span><span class="pdf-item-name">${escHtml(pdf.name)}</span><span class="pdf-item-chunks">${pdf.chunks} chunks</span>`;
      item.addEventListener("click", () => {
        activePdfId = pdf.id;
        renderPdfList();
      });
      pdfList.appendChild(item);
    });
  }

  /* ── Chat ── */
  function escHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function nowTime() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function appendMessage(role, text, sources) {
    const wrap = document.createElement("div");
    wrap.className = `message ${role}`;

    const av = document.createElement("div");
    av.className = `avatar ${role === "user" ? "usr" : role === "error" ? "ai" : "ai"}`;
    av.textContent = role === "user" ? "You" : "AI";

    const bub = document.createElement("div");
    bub.className = "bubble";
    bub.innerHTML = escHtml(text).replace(/\n/g, "<br>");

    if (sources && sources.length) {
      const src = document.createElement("div");
      src.className = "sources";
      sources.forEach(s => {
        const chip = document.createElement("span");
        chip.className = "source-chip";
        chip.innerHTML = `📎 ${escHtml(s)}`;
        src.appendChild(chip);
      });
      bub.appendChild(src);
    }

    const ts = document.createElement("span");
    ts.className = "bubble-time";
    ts.textContent = nowTime();
    bub.appendChild(ts);

    wrap.appendChild(av);
    wrap.appendChild(bub);
    if (role === "error") wrap.className = "message error";

    chatMessages.appendChild(wrap);
    chatMessages.scrollTop = chatMessages.scrollHeight;
    return wrap;
  }

  let typingEl = null;
  function showTyping() {
    typingEl = document.createElement("div");
    typingEl.className = "message ai";
    typingEl.id = "typingIndicator";
    typingEl.innerHTML = `
      <div class="avatar ai">AI</div>
      <div class="bubble" style="padding:0;">
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
    chatMessages.appendChild(typingEl);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }
  function hideTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  /* ── Ask ── */
  async function askQuestion() {
    const q = question.value.trim();
    if (!q || isAsking) return;

    if (!activePdfId) {
      noPdfBanner.classList.add("visible");
      return;
    }
    noPdfBanner.classList.remove("visible");

    isAsking = true;
    question.disabled = true;
    sendBtn.disabled = true;
    question.value = "";
    updateCharCount();

    appendMessage("user", q);
    showTyping();

    try {
      const response = await fetch(`${API_URL}/ask`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question: q, pdf_id: activePdfId }),
        signal: AbortSignal.timeout(30000)
      });

      hideTyping();

      if (!response.ok) {
        let errMsg = `Server error (${response.status})`;
        try {
          const errData = await response.json();
          errMsg = errData.detail || errData.message || errMsg;
        } catch {}
        throw new Error(errMsg);
      }

      const data = await response.json();
      const answer = data.answer || data.response || data.result || "(No answer returned)";
      const sources = data.sources || data.chunks_used || [];
      appendMessage("ai", answer, sources);

    } catch (err) {
      hideTyping();
      let msg = err.message || "Unknown error";
      if (err.name === "TimeoutError") msg = "Request timed out. The server may be overloaded.";
      if (msg.includes("Failed to fetch") || msg.includes("NetworkError")) {
        msg = "Lost connection to the API. Please check your backend.";
      }
      appendMessage("error", "⚠️ " + msg);
    } finally {
      isAsking = false;
      question.disabled = false;
      sendBtn.disabled = false;
      question.focus();
    }
  }

  sendBtn.addEventListener("click", askQuestion);
  question.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); askQuestion(); }
  });

  /* ── Char counter ── */
  function updateCharCount() {
    const len = question.value.length;
    charCount.textContent = `${len} / ${MAX_CHARS}`;
    charCount.classList.toggle("warn", len > MAX_CHARS * 0.85);
    sendBtn.disabled = len === 0 || len > MAX_CHARS || !activePdfId || isAsking;
  }
  question.addEventListener("input", () => {
    if (question.value.length > MAX_CHARS) {
      question.value = question.value.slice(0, MAX_CHARS);
    }
    /* auto-resize */
    question.style.height = "auto";
    question.style.height = Math.min(question.scrollHeight, 140) + "px";
    updateCharCount();
  });
</script>

</body>
